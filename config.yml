
# config.yml
# Konfigurera din jobbsökning här

keywords:
  - "LIA DevOps"
  - "LIA cloud"
  - "LIA infrastruktur"
  - "LIA IT"
  - "LIA Linux"
  - "LIA drift"
  - "LIA kubernetes"
  - "LIA automation"
  - "LIA systemadministration"
  - "praktik DevOps"
  - "praktik cloud"
  - "praktik infrastruktur"
  - "praktik IT"
  - "praktik drift"
  - "praktikplats IT"

# Platser att söka på (kommunnamn)
locations:
  - Stockholm
  - Solna
  - Sundbyberg
  - Huddinge
  - Nacka
  - Lidingö
  - Kista
  - Täby
  - Järfälla
  - Danderyd
  - Tyresö
  - Haninge
  - Botkyrka
  - Södertälje
  - Uppsala

# Hur många resultat per sökning (max 100)
limit: 50

# KRAV - Minst ETT av dessa ord MÅSTE finnas i jobbtitel eller företagsnamn
required_words:
  - lia
  - praktik

# FILTRERING - Minst ETT av dessa ord måste finnas i jobbtitel eller företagsnamn
# Anpassat efter Thomas stack: DevOps, Kubernetes, Terraform, Ansible, GitOps, monitoring
include_words:
  - devops
  - cloud
  - kubernetes
  - docker
  - terraform
  - ansible
  - argocd
  - gitops
  - github actions
  - ci/cd
  - linux
  - infrastructure
  - infrastruktur
  - drift
  - automation
  - prometheus
  - grafana
  - aws
  - azure
  - gcp

# Om NÅGOT av dessa ord finns så filtreras jobbet bort
exclude_words:
  - hotell
  - restaurang
  - kock
  - servitör
  - bartender
  - café
  - fordon
  - mekaniker
  - busschaufför
  - vård
  - sjuk
  - tand
  - lärare
  - butik
  - lager
  - bygg
  - snickare
  - elektriker
  - städ
  - senior
  - lead
  - architect
  - principal
  - säkerhetsprövning
  - security clearance
  - 5 år
  - 5+ years
  - 3+ years
  - marknadsplanerare
  - marknad
  - försäljning
  - sales
  - support
  - key account
  - logistik
  - helpdesk
  - servicedesk
  - compliance
